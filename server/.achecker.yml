# .achecker.yml
ruleArchive: latest
policies:
  - IBM_Accessibility
failLevels:
  - violation
  - potentialviolation
reportLevels:
  - violation
  - potentialviolation
  - recommendation
  - potentialrecommendation
  - manual
outputFormat:
  - json
outputFolder: accessibility-reports
cacheFolder: /tmp/accessibility-checker
puppeteerArgs:
  - "--no-sandbox"
  - "--disable-setuid-sandbox"
  - "--disable-dev-shm-usage"